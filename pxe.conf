port=0 # Disables DNS to avoid conflicts
log-dhcp # Helps you see if the ThinkPad is connecting
dhcp-range=192.168.31.0,proxy
dhcp-boot=netboot.xyz.efi,,192.168.31.75
pxe-service=X86-64_EFI, "Boot netboot.xyz", netboot.xyz.efi

# Add this to avoid log spam and be explicit
log-queries  # optional, remove if too noisy
interface=eth0  # lock to your Pi's ethernet interface, not wlan

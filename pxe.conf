port=0                                        # Disable dnsmasq DNS server — prevents conflicts with router's DNS
log-dhcp                                      # Log DHCP transactions — confirms PXE clients are seen by the Pi
dhcp-range=192.xx.xx.0,proxy                  # Replace 192.xx.xx.0 with your router subnet e.g. 192.168.1.0 — proxy mode: Pi answers PXE requests only, router still assigns IPs
dhcp-boot=netboot.xyz.efi,,192.xxx.xx.xx      # Replace 192.xxx.xx.xx with your Pi's static IP on the network
pxe-service=X86-64_EFI,"Boot netboot.xyz",netboot.xyz.efi  # Advertise PXE boot option for 64-bit EFI clients
log-queries                                   # Log DNS queries — remove if logs get too noisy
interface=eth0                                # Bind dnsmasq to ethernet only — ignores wlan0 and other interfaces

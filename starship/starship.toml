format = """
$custom\
[](fg:#1a1b26 bg:none)\
[](fg:#24283b bg:#1a1b26)\
$os\
$username\
[](fg:#24283b bg:#2f3549)\
$directory\
[](fg:#2f3549 bg:#3b4261)\
$git_branch\
$git_status\
$git_state\
[](fg:#3b4261 bg:#414868)\
$nix_shell\
$python\
$rust\
$golang\
$nodejs\
$lua\
$java\
[](fg:#414868 bg:#565f89)\
$cmd_duration\
[](fg:#565f89 bg:#7aa2f7)\
$time\
[](fg:#7aa2f7 bg:none)\
$fill\
$status\
$line_break\
$character"""

add_newline = false
command_timeout = 5000

# ── OS / User ──────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bg:#24283b fg:#7aa2f7"
format = "[ $symbol ]($style)"

[os.symbols]
NixOS    = "󱄅"
Linux    = ""
Ubuntu   = ""
Arch     = ""
Debian   = ""
Fedora   = ""

[username]
disabled = false
show_always = false
style_user = "bg:#24283b fg:#c0caf5"
style_root = "bg:#24283b fg:#f7768e"
format = "[ $user ]($style)"

# ── Directory ──────────────────────────────────────────────────────────────
[directory]
style = "bg:#2f3549 fg:#7dcfff bold"
format = "[ 󰉋 $path ]($style)"
home_symbol = "~"
truncate_to_repo = true
truncation_length = 2
truncation_symbol = "…/"
read_only = " 󰌾"
substitutions = {
  "Documents" = "󰈙 ",
  "Downloads" = "󰇚 ",
  "Music"     = "󰝚 ",
  "Pictures"  = "󰉏 ",
  "Videos"    = "󰕧 ",
  "nixos"     = "󱄅 ",
}

# ── Git ────────────────────────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "bg:#3b4261 fg:#9ece6a"
format = "[ $symbol $branch ]($style)"
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bg:#3b4261 fg:#e0af68"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "󰞇 "
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
untracked  = "󰋖 "
stashed    = " "
modified   = "󰝶 "
staged     = " "
renamed    = "󰑕 "
deleted    = "󰗨 "

[git_state]
style = "bg:#3b4261 fg:#f7768e"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

# ── Languages ─────────────────────────────────────────────────────────────
[nix_shell]
symbol = "󱄅"
style = "bg:#414868 fg:#7aa2f7"
format = "[ $symbol $state ]($style)"
impure_msg = ""
pure_msg   = "pure"

[python]
symbol = ""
style = "bg:#414868 fg:#e0af68"
format = '[ $symbol $pyenv_prefix($version)(\($virtualenv\)) ]($style)'
detect_extensions = ["py"]

[rust]
symbol = ""
style = "bg:#414868 fg:#f7768e"
format = "[ $symbol $version ]($style)"

[golang]
symbol = ""
style = "bg:#414868 fg:#7dcfff"
format = "[ $symbol $version ]($style)"

[nodejs]
symbol = ""
style = "bg:#414868 fg:#9ece6a"
format = "[ $symbol $version ]($style)"

[lua]
symbol = ""
style = "bg:#414868 fg:#7aa2f7"
format = "[ $symbol $version ]($style)"

[java]
symbol = ""
style = "bg:#414868 fg:#e0af68"
format = "[ $symbol $version ]($style)"

# ── Duration + Time ────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
style = "bg:#565f89 fg:#e0af68"
format = "[ 󱎫 $duration ]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "bg:#7aa2f7 fg:#1a1b26 bold"
format = "[  $time ]($style)"

# ── Right side ─────────────────────────────────────────────────────────────
[fill]
symbol = " "

[status]
disabled = false
symbol = "✘"
success_symbol = ""
style = "fg:#f7768e"
format = "[$symbol $status]($style) "

# ── Prompt character ───────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol   = "[❯](bold #f7768e)"
vimcmd_symbol  = "[❮](bold #bb9af7)"

# ── Disabled clutter ───────────────────────────────────────────────────────
[package]
disabled = true

[conda]
disabled = true

[docker_context]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

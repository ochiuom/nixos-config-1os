# General settings
add_newline = true          # keeps command output visually separated from prompt
command_timeout = 5000

# Prompt character
[character]
disabled = true
#success_symbol = "[Ō×£](bold #A3BE8C)"
#error_symbol   = "[Ō£¢](bold #BF616A)"
#vicmd_symbol   = "[ŌŚå](bold #A3BE8C)"



[username]
disabled = true

# --------------------
# Directory ŌĆö central, compact
# --------------------
[directory]
style = "bg:#434C5E fg:#ECEFF4"
format = "[ $path ]($style)"
home_symbol = "~"
truncate_to_repo = true
truncation_length = 1
truncation_symbol = "ŌĆ”/"
read_only = " ­¤öÆ"
substitutions = { "Documents" = "¾░łÖ ", "Downloads" = "’ĆÖ ", "Music" = "’Ćü ", "Pictures" = "’ĆŠ " }

# close the directory block visually with separator (next module will add its own bg)
# Starship will concatenate modules; the overall visual is produced by consistent bg/fg



[c]
symbol = "Ņś× "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "’īł "
style = "bg:#06969A"
format = '[ $symbol $context ]($style)$path'

[elixir]
symbol = "ŅēĄ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "Ņś¼ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "’äō"
style = "bg:#4C566A"

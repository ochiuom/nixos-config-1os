# vim:ft=kitty
## name: Tokyo Night
## author: Folke Lemaitre
## upstream: https://github.com/folke/tokyonight.nvim
## blurb: A clean, dark Neovim theme that celebrates the lights of Downtown Tokyo at night.
## variant: Storm


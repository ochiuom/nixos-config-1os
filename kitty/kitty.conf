# ╔══════════════════════════════════════════════════════════════╗
# ║           kitty.conf — Tokyo Night  (ochinix 2026)          ║
# ╚══════════════════════════════════════════════════════════════╝

# ---------------------------------------------------------
# 🗚  FONTS
# ---------------------------------------------------------
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.5

font_features JetBrainsMonoNF-Regular +calt +liga
font_features JetBrainsMonoNF-Bold    +calt +liga

# Disable ligatures only when cursor sits on them
disable_ligatures cursor

# ---------------------------------------------------------
# 🎨  COLORS — Tokyo Night Storm variant
# ---------------------------------------------------------
foreground            #c0caf5
background            #1a1b26
selection_foreground  #c0caf5
selection_background  #2e3c64

# Cursor
cursor            #bb9af7
cursor_text_color #1a1b26

# URL hover underline
url_color         #73daca
url_style         curly

# Window borders
active_border_color   #7aa2f7
inactive_border_color #27283d
bell_border_color     #e0af68

# Tab bar
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #545c7e
inactive_tab_background #16161e
tab_bar_background      #101014

# The 16 ANSI colors — Tokyo Night
# Black
color0  #15161e
color8  #414868
# Red
color1  #f7768e
color9  #f7768e
# Green
color2  #9ece6a
color10 #9ece6a
# Yellow
color3  #e0af68
color11 #e0af68
# Blue
color4  #7aa2f7
color12 #7aa2f7
# Magenta
color5  #bb9af7
color13 #bb9af7
# Cyan
color6  #7dcfff
color14 #7dcfff
# White
color7  #a9b1d6
color15 #c0caf5

# ---------------------------------------------------------
# 🪟  WINDOW
# ---------------------------------------------------------
background_opacity         0.92
dynamic_background_opacity yes

window_padding_width       12
hide_window_decorations    titlebar-only
confirm_os_window_close    0

initial_window_width       110c
initial_window_height      32c
remember_window_size       no

# Subtle inner border glow
draw_minimal_borders yes
window_margin_width  0

# ---------------------------------------------------------
# 🖱️  CURSOR
# ---------------------------------------------------------
cursor_shape               beam
cursor_beam_thickness      1.6
cursor_blink_interval      0.5
cursor_stop_blinking_after 12.0

# Smooth cursor trail (kitty >= 0.35)
cursor_trail                5
cursor_trail_decay          0.1 0.35
cursor_trail_start_threshold 2

# ---------------------------------------------------------
# 📑  TAB BAR
# ---------------------------------------------------------
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1
tab_title_template      "{index}: {title[:20]}"

# ---------------------------------------------------------
# ⚡  PERFORMANCE
# ---------------------------------------------------------
repaint_delay    6
input_delay      1
sync_to_monitor  yes

# ---------------------------------------------------------
# 🔧  BEHAVIOUR
# ---------------------------------------------------------
detect_urls              yes
copy_on_select           clipboard
strip_trailing_spaces    smart
focus_follows_mouse      no
shell_integration        enabled
allow_remote_control     yes

# ---------------------------------------------------------
# ⌨️  KEYBINDINGS
# ---------------------------------------------------------
# Clear all defaults, define only what we need
clear_all_shortcuts no

# Reload config
map ctrl+shift+f5    load_config_file

# Tabs
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+1     goto_tab 1
map ctrl+shift+2     goto_tab 2
map ctrl+shift+3     goto_tab 3
map ctrl+shift+4     goto_tab 4

# Windows / splits
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+q     close_window
map alt+left         neighboring_window left
map alt+right        neighboring_window right
map alt+up           neighboring_window up
map alt+down         neighboring_window down

# Font size
map ctrl+equal       change_font_size all +1.0
map ctrl+minus       change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Clipboard
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard

# Scrollback
map ctrl+shift+k     scroll_line_up
map ctrl+shift+j     scroll_line_down
map ctrl+shift+u     scroll_page_up
map ctrl+shift+d     scroll_page_down
map ctrl+shift+home  scroll_home
map ctrl+shift+end   scroll_end

# ╔══════════════════════════════════════════════════════════════╗
# ║           kitty.conf — Tokyo Night  (ochinix 2026)          ║
# ╚══════════════════════════════════════════════════════════════╝

#include tokyo-night.conf
include nord.conf
# ---------------------------------------------------------
# 🗚  FONTS
# ---------------------------------------------------------
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.5

font_features JetBrainsMonoNF-Regular +calt +liga
font_features JetBrainsMonoNF-Bold    +calt +liga

disable_ligatures cursor

# ---------------------------------------------------------
# 🪟  WINDOW
# ---------------------------------------------------------
background_opacity         0.92
dynamic_background_opacity yes

window_padding_width       12
hide_window_decorations    titlebar-only
confirm_os_window_close    0

initial_window_width       110c
initial_window_height      32c
remember_window_size       no

draw_minimal_borders yes
window_margin_width  0

# ---------------------------------------------------------
# 🖱️  CURSOR
# ---------------------------------------------------------
cursor_shape               beam
cursor_beam_thickness      1.6
cursor_blink_interval      0.5
cursor_stop_blinking_after 12.0

cursor_trail                5
cursor_trail_decay          0.1 0.35
cursor_trail_start_threshold 2

# ---------------------------------------------------------
# 📑  TAB BAR
# ---------------------------------------------------------
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1
tab_title_template      "{index}: {title[:20]}"

# ---------------------------------------------------------
# ⚡  PERFORMANCE
# ---------------------------------------------------------
repaint_delay    6
input_delay      1
sync_to_monitor  yes

# ---------------------------------------------------------
# 🔧  BEHAVIOUR
# ---------------------------------------------------------
detect_urls              yes
copy_on_select           clipboard
strip_trailing_spaces    smart
focus_follows_mouse      no
shell_integration        enabled
allow_remote_control     yes

# ---------------------------------------------------------
# ⌨️  KEYBINDINGS
# ---------------------------------------------------------
clear_all_shortcuts no

map ctrl+shift+f5    load_config_file

# Tabs
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+1     goto_tab 1
map ctrl+shift+2     goto_tab 2
map ctrl+shift+3     goto_tab 3
map ctrl+shift+4     goto_tab 4

# Windows / splits
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+q     close_window
map alt+left         neighboring_window left
map alt+right        neighboring_window right
map alt+up           neighboring_window up
map alt+down         neighboring_window down

# Font size
map ctrl+equal       change_font_size all +1.0
map ctrl+minus       change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Clipboard
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard

# Scrollback
map ctrl+shift+k     scroll_line_up
map ctrl+shift+j     scroll_line_down
map ctrl+shift+u     scroll_page_up
map ctrl+shift+d     scroll_page_down
map ctrl+shift+home  scroll_home
map ctrl+shift+end   scroll_end
